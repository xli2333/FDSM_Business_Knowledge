limit_req_zone $binary_remote_addr zone=fdsm_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=fdsm_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=fdsm_ai:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=fdsm_addr:10m;

upstream fdsm_backend {
    server backend-web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200m;
    client_body_timeout 60s;
    keepalive_timeout 65s;
    limit_req_status 429;
    limit_conn_status 429;
    limit_req_log_level warn;
    limit_conn_log_level warn;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location /api/auth/ {
        limit_req zone=fdsm_auth burst=10 nodelay;
        limit_conn fdsm_addr 30;
        proxy_pass http://fdsm_backend;
    }

    location /api/chat {
        limit_req zone=fdsm_ai burst=12 nodelay;
        limit_conn fdsm_addr 20;
        proxy_pass http://fdsm_backend;
    }

    location = /api/metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        access_log off;
        limit_req zone=fdsm_api burst=20 nodelay;
        limit_conn fdsm_addr 10;
        proxy_pass http://fdsm_backend;
    }

    location ~ ^/api/media/(audio|video)/[^/]+/stream$ {
        access_log off;
        limit_req zone=fdsm_api burst=80 nodelay;
        limit_conn fdsm_addr 60;
        proxy_pass http://fdsm_backend;
    }

    location /api/ {
        limit_req zone=fdsm_api burst=80 nodelay;
        limit_conn fdsm_addr 60;
        proxy_pass http://fdsm_backend;
    }

    location ^~ /audio-files/ {
        internal;
        alias /data/audio/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/audio/media/ {
        internal;
        alias /data/uploads/media/audio/media/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/video/media/ {
        internal;
        alias /data/uploads/media/video/media/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/audio/transcript/ {
        internal;
        alias /data/uploads/media/audio/transcript/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/audio/script/ {
        internal;
        alias /data/uploads/media/audio/script/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/video/transcript/ {
        internal;
        alias /data/uploads/media/video/transcript/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/video/script/ {
        internal;
        alias /data/uploads/media/video/script/;
        access_log off;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /editorial-uploads/ {
        alias /data/uploads/editorial/;
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/audio/cover/ {
        alias /data/uploads/media/audio/cover/;
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/video/cover/ {
        alias /data/uploads/media/video/cover/;
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /media-uploads/ {
        return 404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
